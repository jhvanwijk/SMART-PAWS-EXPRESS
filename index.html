<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Paws Express</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #fffaf3;
      text-align: center;
    }

    .hero {
      position: relative;
    }

    .hero img {
      width: 100%;
      height: 65vh;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.45);
      padding: 25px 40px;
      border-radius: 15px;
      color: white;
    }

    .overlay h1 {
      margin: 0;
      font-size: 2.8rem;
    }

    .overlay p {
      margin-top: 10px;
      font-size: 1.2rem;
    }

    .content {
      padding: 40px 20px;
    }

    .btn {
      display: inline-block;
      padding: 16px 28px;
      font-size: 18px;
      color: white;
      background-color: #25D366;
      border-radius: 50px;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .btn:hover {
      background-color: #1DA851;
      transform: scale(1.08);
    }

    .section {
      padding: 40px 20px;
    }

    .section h2 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .hero img {
        height: 50vh;
      }

      .overlay h1 {
        font-size: 1.8rem;
      }

      .overlay p {
        font-size: 1rem;
      }
    }

  </style>
</head>
<body>

  <div class="hero">
    <img src="26_New_Year_Header.png" alt="Smart Paws Express Dog">
    <div class="overlay">
      <h1>Smart Paws Express 🐾</h1>
      <p>Premium Pet Food Delivered Fast</p>
    </div>
  </div>

  <div class="section">
    <h2>Healthy Food. Happy Pets.</h2>
    <p>We supply quality pet food at great prices. Fast responses and friendly service!</p>
  </div>

  <div class="content">
    <a class="btn" href="https://wa.me/27712345678?text=Hi%20Smart%20Paws%20Express!%20I'd%20like%20to%20enquire%20about%20your%20pet%20food." target="_blank">
      🐶 Chat on WhatsApp
    </a>
  </div>

</body>
</html>
